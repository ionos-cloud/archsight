name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.4", "4.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.ruby-version }}
          path: coverage/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rake rubocop

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Run Steep type checker
        run: bundle exec rake steep:check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Run bundler-audit
        run: bundle exec rake bundle:audit:check

  build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: archsight:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm archsight:latest version
          docker run --rm -v "${{ github.workspace }}/examples:/resources" archsight:latest lint

      - name: Smoketest Docker image
        run: |
          # Start container with example data
          docker run -d --name smoketest \
            -p 4567:4567 \
            -v "${{ github.workspace }}/examples:/resources" \
            archsight:latest

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4567/ > /dev/null 2>&1; then
              break
            fi
            if [ "$i" = "30" ]; then
              echo "FAIL: Server did not start within 30s"
              docker logs smoketest
              exit 1
            fi
            sleep 1
          done

          PASS=0
          FAIL=0

          check() {
            URL=$1
            MATCH=$2
            BODY=$(curl -sf "$URL") || { echo "FAIL: $URL (request failed)"; FAIL=$((FAIL+1)); return; }
            if echo "$BODY" | grep -q "$MATCH"; then
              echo "OK:   $URL"
              PASS=$((PASS+1))
            else
              echo "FAIL: $URL (expected '$MATCH')"
              FAIL=$((FAIL+1))
            fi
          }

          check_status() {
            URL=$1
            if curl -sf -o /dev/null "$URL"; then
              echo "OK:   $URL"
              PASS=$((PASS+1))
            else
              echo "FAIL: $URL (expected HTTP 200)"
              FAIL=$((FAIL+1))
            fi
          }

          echo "=== Smoketest ==="

          # Vue SPA HTML references a JS bundle
          check "http://localhost:4567/" "/vue/"

          # Vue JS bundle is served (extract asset path from HTML)
          VUE_JS=$(curl -sf http://localhost:4567/ | grep -oE '/vue/[^"]+\.js' | head -1)
          if [ -n "$VUE_JS" ]; then
            check_status "http://localhost:4567$VUE_JS"
          else
            echo "FAIL: Could not find Vue JS bundle path in HTML"
            FAIL=$((FAIL+1))
          fi

          # Favicon is served
          check_status "http://localhost:4567/favicon.ico"

          # API: kinds list returns JSON with resource types
          check "http://localhost:4567/api/v1/kinds" "ApplicationComponent"

          # API: instances of a kind
          check "http://localhost:4567/api/v1/kinds/ApplicationComponent" '"kind"'

          # API: search
          check "http://localhost:4567/api/v1/search?q=ApplicationComponent:" '"kind"'

          # API: OpenAPI spec
          check "http://localhost:4567/api/v1/openapi.yaml" "openapi"

          echo "=== Results: $PASS passed, $FAIL failed ==="

          docker stop smoketest

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi

  release-gem:
    needs: [test, lint, typecheck, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"

      - name: Install dependencies
        run: bundle install

      - name: Update version from git tag
        run: bundle exec rake version

      - name: Build and publish gem
        uses: rubygems/release-gem@v1

  release-container:
    needs: [test, lint, typecheck, security, build-container]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Update version from git tag
        run: bundle exec rake version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
